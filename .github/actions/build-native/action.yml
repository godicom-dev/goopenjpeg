name: Build native library
description: Build goopenjpeg shared library and copy to native/libs/

inputs:
  embed-name:
    description: Output filename under native/libs/
    required: true

runs:
  using: composite
  steps:
    - name: Windows - setup MSVC
      if: runner.os == 'Windows'
      uses: ilammy/msvc-dev-cmd@v1

    - name: Windows - build and copy
      if: runner.os == 'Windows'
      shell: bash
      run: |
        set -euo pipefail
        cmake -S lib -B lib/build -G Ninja -DCMAKE_BUILD_TYPE=Release
        cmake --build lib/build --target goopenjpeg
        test -f lib/build/goopenjpeg.dll
        mkdir -p native/libs
        cp lib/build/goopenjpeg.dll "native/libs/${{ inputs.embed-name }}"
        ls -la "native/libs/${{ inputs.embed-name }}"

    - name: Unix - build and copy
      if: runner.os != 'Windows'
      shell: bash
      run: |
        set -euo pipefail
        cmake -S lib -B lib/build_nix \
          -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_POSITION_INDEPENDENT_CODE=ON
        cmake --build lib/build_nix --target goopenjpeg
        mkdir -p native/libs
        if [ "${{ runner.os }}" = "Linux" ]; then
          test -f lib/build_nix/libgoopenjpeg.so
          cp lib/build_nix/libgoopenjpeg.so "native/libs/${{ inputs.embed-name }}"
        else
          test -f lib/build_nix/libgoopenjpeg.dylib
          cp lib/build_nix/libgoopenjpeg.dylib "native/libs/${{ inputs.embed-name }}"
        fi
        ls -la "native/libs/${{ inputs.embed-name }}"
